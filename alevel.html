<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Spanish A-Level Revision - AQA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:12px}
.app{max-width:900px;margin:0 auto}
.header{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.1);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:1.3em;color:#333}
.stats{font-size:.85em;color:#666}
.reset-btn{background:#ef4444;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.8em}
.reset-btn:hover{background:#dc2626}
.layout{display:flex;gap:12px}
.sidebar{width:240px;flex-shrink:0;background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 12px rgba(0,0,0,.1);max-height:80vh;overflow-y:auto}
.sidebar h3{font-size:.9em;color:#555;margin-bottom:8px}
.cat-btn{display:block;width:100%;text-align:left;padding:8px 10px;margin:2px 0;border:none;border-radius:6px;cursor:pointer;font-size:.82em;background:#f3f4f6;color:#333;transition:all .2s}
.cat-btn:hover{background:#e5e7eb}
.cat-btn.active{background:#667eea;color:#fff}
.cnt{float:right;background:rgba(0,0,0,.1);padding:1px 6px;border-radius:10px;font-size:.8em}
.cat-btn.active .cnt{background:rgba(255,255,255,.3)}
.subcat{padding-left:12px}
.main{flex:1;min-width:0}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.1)}
.topic-tag{display:inline-block;background:#667eea22;color:#667eea;padding:3px 10px;border-radius:20px;font-size:.78em;margin-bottom:12px;font-weight:600}
.question{font-size:1.15em;color:#1a1a2e;margin-bottom:20px;line-height:1.5}
.options{display:flex;flex-direction:column;gap:8px}
.option{padding:14px 16px;border:2px solid #e5e7eb;border-radius:10px;cursor:pointer;font-size:1em;transition:all .2s;background:#fff}
.option:hover{border-color:#667eea;background:#667eea08}
.option.correct{border-color:#10b981;background:#ecfdf5;color:#065f46}
.option.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b}
.option.disabled{pointer-events:none;opacity:.6}
.option.highlight{border-color:#10b981;background:#ecfdf5}
.explanation{margin-top:16px;padding:12px 16px;background:#f0fdf4;border-left:4px solid #10b981;border-radius:0 8px 8px 0;font-size:.92em;color:#065f46}
.next-btn{margin-top:16px;width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1.05em;font-weight:600;cursor:pointer}
.next-btn:hover{opacity:.9;transform:translateY(-1px)}
.next-btn.grey{background:#6b7280;margin-top:8px}
.completed-msg{text-align:center;padding:40px 20px}
.completed-msg h2{color:#10b981;margin-bottom:12px}
.completed-msg p{color:#666;margin-bottom:8px}
.progress-bar{height:4px;background:#e5e7eb;border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:2px;transition:width .3s}
.welcome{text-align:center;padding:40px 20px}
.welcome h2{color:#333;margin-bottom:12px}
.welcome p{color:#666;font-size:.95em}
.remaining{font-size:.8em;color:#999}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
@media(max-width:700px){.layout{flex-direction:column}.sidebar{width:100%;max-height:none}}
</style>
</head>

, "correct": 1, "explanation": "Desde hace + present tense for ongoing: Vivo aquí desde hace 5 años"}, {"id": "q_1223", "category": "Grammar", "subcategory": "Time Expressions", "topic": "Desde/Hace", "question": "What does \"desde\" mean?", "options": ["for", "since", "ago", "until"], "correct": 1, "explanation": "Desde = since: Desde 2020 = since 2020"}, {"id": "q_1224", "category": "Grammar", "subcategory": "Subjunctive Uses", "topic": "Triggers", "question": "Which expression triggers the subjunctive?", "options": ["Creo que", "Es importante que", "Sé que", "Digo que"], "correct": 1, "explanation": "Es importante que + subjunctive (impersonal expression)"}, {"id": "q_1225", "category": "Grammar", "subcategory": "Subjunctive Uses", "topic": "Triggers", "question": "Which expression triggers the subjunctive?", "options": ["Pienso que", "Es verdad que", "Quiero que", "Creo que"], "correct": 2, "explanation": "Quiero que + subjunctive (desire/wish)"}, {"id": "q_1226", "category": "Grammar", "subcategory": "Subjunctive Uses", "topic": "Triggers", "question": "Does \"No creo que\" trigger the subjunctive?", "options": ["No", "Yes", "Only sometimes", "Only in formal speech"], "correct": 1, "explanation": "Negated belief = subjunctive: No creo que sea verdad"}, {"id": "q_1227", "category": "Grammar", "subcategory": "Subjunctive Uses", "topic": "Triggers", "question": "Which phrase does NOT trigger the subjunctive?", "options": ["Es posible que", "Dudo que", "Es cierto que", "Es necesario que"], "correct": 2, "explanation": "Es cierto que = certainty → indicative, not subjunctive"}, {"id": "q_1228", "category": "Grammar", "subcategory": "Subjunctive Uses", "topic": "Triggers", "question": "What does \"ojalá\" trigger?", "options": ["Indicative", "Subjunctive", "Conditional", "Imperative"], "correct": 1, "explanation": "Ojalá always triggers subjunctive: Ojalá venga = I hope he comes"}, {"id": "q_1229", "category": "Grammar", "subcategory": "Subjunctive Uses", "topic": "Cuando", "question": "After \"cuando\" referring to the future, which mood?", "options": ["Indicative", "Subjunctive", "Conditional", "Imperative"], "correct": 1, "explanation": "Cuando + future reference = subjunctive: Cuando llegue..."}, {"id": "q_1230", "category": "Grammar", "subcategory": "Subjunctive Uses", "topic": "Purpose", "question": "After \"para que\" (so that), which mood?", "options": ["Indicative", "Subjunctive", "Conditional", "Imperative"], "correct": 1, "explanation": "Para que always triggers subjunctive"}, {"id": "q_1231", "category": "Grammar", "subcategory": "Subjunctive Uses", "topic": "Purpose", "question": "After \"antes de que\" (before), which mood?", "options": ["Indicative", "Subjunctive", "Conditional", "Imperative"], "correct": 1, "explanation": "Antes de que always triggers subjunctive"}, {"id": "q_1232", "category": "Grammar", "subcategory": "Subjunctive Uses", "topic": "Emotion", "question": "\"Me alegro de que...\" triggers which mood?", "options": ["Indicative", "Subjunctive", "Conditional", "Imperative"], "correct": 1, "explanation": "Emotion + que = subjunctive: Me alegro de que vengas"}, {"id": "q_1233", "category": "Grammar", "subcategory": "Subjunctive Uses", "topic": "Si Clauses", "question": "\"Si yo fuera rico...\" uses which tense?", "options": ["Present subjunctive", "Imperfect subjunctive", "Preterite", "Present indicative"], "correct": 1, "explanation": "Si + imperfect subjunctive for hypothetical: Si fuera rico..."}, {"id": "q_1234", "category": "Grammar", "subcategory": "Subjunctive Uses", "topic": "Si Clauses", "question": "Complete: \"Si tuviera dinero, ___ un coche\"", "options": ["compro", "compré", "compraría", "compre"], "correct": 2, "explanation": "Si + imp. subjunctive → conditional: Si tuviera... compraría"}, {"id": "q_1235", "category": "Grammar", "subcategory": "Subjunctive Uses", "topic": "Si Clauses", "question": "\"Si llueve mañana...\" uses which mood?", "options": ["Subjunctive", "Indicative", "Conditional", "Imperative"], "correct": 1, "explanation": "Si + present indicative for real conditions: Si llueve..."}, {"id": "q_1236", "category": "Grammar", "subcategory": "Passive & Impersonal", "topic": "Se Passive", "question": "What does \"Se habla español\" mean?", "options": ["He speaks Spanish", "Spanish is spoken", "They speak Spanish", "One speaks Spanish"], "correct": 1, "explanation": "Se + 3rd person = passive: Se habla español = Spanish is spoken"}, {"id": "q_1237", "category": "Grammar", "subcategory": "Passive & Impersonal", "topic": "Se Passive", "question": "What does \"Se venden pisos\" mean?", "options": ["He sells flats", "Flats sell themselves", "Flats are sold/for sale", "They sell flats"], "correct": 2, "explanation": "Se venden pisos = Flats are sold/for sale"}, {"id": "q_1238", "category": "Grammar", "subcategory": "Passive & Impersonal", "topic": "Se Impersonal", "question": "What does \"Se puede nadar aquí\" mean?", "options": ["He can swim here", "One can swim here / You can swim here", "Swimming is here", "They swim here"], "correct": 1, "explanation": "Se puede = one can / you can (impersonal)"}, {"id": "q_1239", "category": "Grammar", "subcategory": "Passive & Impersonal", "topic": "Se Impersonal", "question": "What does \"Se dice que...\" mean?", "options": ["He says that", "It is said that / They say that", "One says that", "People say that"], "correct": 1, "explanation": "Se dice que = It is said that / They say that"}, {"id": "q_1240", "category": "Grammar", "subcategory": "Passive & Impersonal", "topic": "Ser Passive", "question": "How do you form the passive with ser?", "options": ["ser + gerund", "ser + past participle", "ser + infinitive", "ser + adjective"], "correct": 1, "explanation": "Passive: ser + past participle: fue construido = was built"}, {"id": "q_1241", "category": "Grammar", "subcategory": "Passive & Impersonal", "topic": "Ser Passive", "question": "What is \"The book was written by García Márquez\"?", "options": ["El libro escribió por...", "El libro fue escrito por...", "El libro era escrito por...", "El libro se escribió por..."], "correct": 1, "explanation": "Ser passive: El libro fue escrito por..."}, {"id": "q_1242", "category": "Grammar", "subcategory": "Passive & Impersonal", "topic": "Se Accidental", "question": "What does \"Se me olvidó\" mean?", "options": ["I forgot on purpose", "I accidentally forgot / It slipped my mind", "He forgot me", "They forgot me"], "correct": 1, "explanation": "Se me olvidó = I (accidentally) forgot (accidental se)"}, {"id": "q_1243", "category": "Grammar", "subcategory": "Passive & Impersonal", "topic": "Se Accidental", "question": "What does \"Se me cayó el vaso\" mean?", "options": ["I dropped the glass", "The glass fell on me", "The glass dropped itself", "I threw the glass"], "correct": 0, "explanation": "Se me cayó = I dropped (accidentally): The glass fell from me"}, {"id": "q_1244", "category": "Grammar", "subcategory": "Question Words", "topic": "Questions", "question": "What does \"¿Cuánto?\" mean?", "options": ["When?", "How much?", "How many?", "How?"], "correct": 1, "explanation": "¿Cuánto? = How much?"}, {"id": "q_1245", "category": "Grammar", "subcategory": "Question Words", "topic": "Questions", "question": "What does \"¿Cuántos?\" mean?", "options": ["When?", "How much?", "How many?", "How?"], "correct": 2, "explanation": "¿Cuántos? = How many? (plural)"}, {"id": "q_1246", "category": "Grammar", "subcategory": "Question Words", "topic": "Questions", "question": "What does \"¿Cuál?\" mean?", "options": ["What?", "Which?", "Who?", "How?"], "correct": 1, "explanation": "¿Cuál? = Which?/What? (from a selection)"}, {"id": "q_1247", "category": "Grammar", "subcategory": "Question Words", "topic": "Questions", "question": "What is the difference between \"¿Qué?\" and \"¿Cuál?\"?", "options": ["No difference", "Qué=what type, Cuál=which one", "Qué=which, Cuál=what", "Qué is formal, Cuál informal"], "correct": 1, "explanation": "¿Qué? asks what kind/type; ¿Cuál? asks which one from options"}, {"id": "q_1248", "category": "Grammar", "subcategory": "Question Words", "topic": "Questions", "question": "What does \"¿Adónde?\" mean?", "options": ["From where?", "Where?", "To where?", "How?"], "correct": 2, "explanation": "¿Adónde? = To where? (with motion): ¿Adónde vas?"}, {"id": "q_1249", "category": "Grammar", "subcategory": "Question Words", "topic": "Questions", "question": "What does \"¿De dónde?\" mean?", "options": ["To where?", "Where?", "From where?", "Why?"], "correct": 2, "explanation": "¿De dónde? = From where?: ¿De dónde eres?"}, {"id": "q_1250", "category": "Grammar", "subcategory": "Question Words", "topic": "Questions", "question": "What does \"¿Cómo?\" mean?", "options": ["What?", "When?", "How?", "Why?"], "correct": 2, "explanation": "¿Cómo? = How?"}, {"id": "q_1251", "category": "Grammar", "subcategory": "Question Words", "topic": "Questions", "question": "What does \"¿Cuándo?\" mean?", "options": ["How much?", "How?", "Where?", "When?"], "correct": 3, "explanation": "¿Cuándo? = When?"}];
var STORAGE_KEY = 'spanishALevel_v4';

// ==================== PROGRESS ====================
var progress = {
    scores: {},
    totalCorrect: 0,
    totalAnswered: 0,
    answeredIds: {},
    load: function() {
        try {
            var s = localStorage.getItem(STORAGE_KEY);
            if (s) {
                var d = JSON.parse(s);
                this.scores = d.scores || {};
                this.totalCorrect = d.totalCorrect || 0;
                this.totalAnswered = d.totalAnswered || 0;
                var ids = d.answeredIds || [];
                this.answeredIds = {};
                for (var i = 0; i < ids.length; i++) this.answeredIds[ids[i]] = true;
            }
        } catch(e) {}
    },
    save: function() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            scores: this.scores,
            totalCorrect: this.totalCorrect,
            totalAnswered: this.totalAnswered,
            answeredIds: Object.keys(this.answeredIds)
        }));
    },
    reset: function() {
        this.scores = {};
        this.totalCorrect = 0;
        this.totalAnswered = 0;
        this.answeredIds = {};
        localStorage.removeItem(STORAGE_KEY);
    },
    record: function(qid, topic, correct) {
        this.answeredIds[qid] = true;
        this.totalAnswered++;
        if (correct) this.totalCorrect++;
        if (!this.scores[topic]) this.scores[topic] = {correct:0,total:0};
        this.scores[topic].total++;
        if (correct) this.scores[topic].correct++;
        this.save();
    },
    isAnswered: function(qid) { return !!this.answeredIds[qid]; },
    accuracy: function() {
        if (this.totalAnswered === 0) return 0;
        return Math.round((this.totalCorrect / this.totalAnswered) * 100);
    },
    weakTopics: function() {
        var w = [];
        for (var t in this.scores) {
            var d = this.scores[t];
            if (d.total >= 2 && (d.correct / d.total) < 0.7) w.push(t);
        }
        return w;
    }
};
progress.load();

// ==================== STATE ====================
var selectedCat = null;
var selectedSub = null;
var currentQ = null;
var answered = false;
var selectedAns = null;
var topicCompleted = false;

// ==================== BUILD TREE ====================
function buildTree() {
    var tree = {};
    for (var i = 0; i < QUESTIONS.length; i++) {
        var q = QUESTIONS[i];
        if (!tree[q.category]) tree[q.category] = {};
        if (!tree[q.category][q.subcategory]) tree[q.category][q.subcategory] = 0;
        tree[q.category][q.subcategory]++;
    }
    return tree;
}

// ==================== RENDER ====================
function render() {
    renderStats();
    renderSidebar();
    renderCard();
}

function renderStats() {
    document.getElementById('stats').textContent =
        progress.totalAnswered + ' answered | ' + progress.accuracy() + '% accuracy | ' + QUESTIONS.length + ' total questions';
}

function renderSidebar() {
    var tree = buildTree();
    var html = '<h3>Categories</h3>';
    html += '<button class="cat-btn' + (!selectedCat ? ' active' : '') + '" onclick="clickAll()">' +
        'All Topics <span class="cnt">' + QUESTIONS.length + '</span></button>';

    var cats = Object.keys(tree);
    for (var ci = 0; ci < cats.length; ci++) {
        var cat = cats[ci];
        var catTotal = 0;
        var subs = Object.keys(tree[cat]);
        for (var si = 0; si < subs.length; si++) catTotal += tree[cat][subs[si]];

        var isActive = (selectedCat === cat && !selectedSub);
        html += '<button class="cat-btn' + (isActive ? ' active' : '') + '" onclick="clickCat(&quot;' + esc(cat) + '&quot;)">' +
            esc(cat) + ' <span class="cnt">' + catTotal + '</span></button>';

        if (selectedCat === cat) {
            html += '<div class="subcat">';
            for (var si = 0; si < subs.length; si++) {
                var sub = subs[si];
                var sp = subProgress(cat, sub);
                var subActive = (selectedSub === sub);
                html += '<button class="cat-btn' + (subActive ? ' active' : '') + '" onclick="clickSub(&quot;' + esc(cat) + '&quot;,&quot;' + esc(sub) + '&quot;)">' +
                    esc(sub) + ' <span class="cnt">' + sp.done + '/' + sp.total + '</span></button>';
            }
            html += '</div>';
        }
    }
    document.getElementById('sidebar').innerHTML = html;
}

function renderCard() {
    var card = document.getElementById('card');
    if (topicCompleted) {
        var label = selectedSub || selectedCat || 'all topics';
        card.innerHTML = '<div class="completed-msg">' +
            '<h2>Topic Completed! &#9989;</h2>' +
            '<p>You have answered all questions in ' + esc(label) + '!</p>' +
            '<p>Overall accuracy: ' + progress.accuracy() + '%</p>' +
            '<button class="next-btn" onclick="redoTopic()">Redo This Topic</button>' +
            '<button class="next-btn grey" onclick="clickAll()">Choose Another Topic</button>' +
            '</div>';
        return;
    }
    if (!currentQ) {
        var title2 = selectedSub || selectedCat || 'Ready to Revise?';
        var desc = '';
        if (selectedCat) {
            var pool = getPool();
            var done = 0;
            for (var i = 0; i < pool.length; i++) if (progress.isAnswered(pool[i].id)) done++;
            desc = done + '/' + pool.length + ' questions completed';
        } else {
            desc = 'Select a category from the sidebar or start with all topics';
        }
        card.innerHTML = '<div class="welcome">' +
            '<h2>' + esc(title2) + '</h2>' +
            '<p>' + esc(desc) + '</p>' +
            '<button class="next-btn" onclick="nextQuestion()">Start Practising</button></div>';
        return;
    }
    // Question view
    var h = '<div class="topbar"><span class="topic-tag">' + esc(currentQ.category) + ' &gt; ' + esc(currentQ.subcategory) + '</span>' +
        '<span class="remaining">' + currentQ._remaining + ' remaining</span></div>';
    if (currentQ._totalPool > 0) {
        var pct = Math.round(((currentQ._totalPool - currentQ._remaining) / currentQ._totalPool) * 100);
        h += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
    }
    h += '<p class="question" style="margin-top:12px">' + esc(currentQ.question) + '</p>';
    h += '<div class="options">';
    for (var i = 0; i < currentQ.options.length; i++) {
        var cls = 'option';
        if (answered) {
            if (i === currentQ.correct) cls += ' correct';
            if (i === selectedAns && i !== currentQ.correct) cls += ' wrong';
            if (i !== currentQ.correct && i !== selectedAns) cls += ' disabled';
            if (i === currentQ.correct && i !== selectedAns) cls += ' highlight';
        }
        h += '<div class="' + cls + '" onclick="pickAnswer(' + i + ')">' + esc(currentQ.options[i]) + '</div>';
    }
    h += '</div>';
    if (answered) {
        h += '<div class="explanation">' + esc(currentQ.explanation) + '</div>';
        h += '<button class="next-btn" onclick="nextQuestion()">Next Question &rarr;</button>';
    }
    card.innerHTML = h;
}

function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ==================== POOL HELPERS ====================
function getPool() {
    var pool = QUESTIONS;
    if (selectedCat) pool = pool.filter(function(q){ return q.category === selectedCat; });
    if (selectedSub) pool = pool.filter(function(q){ return q.subcategory === selectedSub; });
    return pool;
}

function subProgress(cat, sub) {
    var pool = QUESTIONS.filter(function(q){ return q.category === cat && q.subcategory === sub; });
    var done = 0;
    for (var i = 0; i < pool.length; i++) if (progress.isAnswered(pool[i].id)) done++;
    return {done: done, total: pool.length};
}

// ==================== ACTIONS ====================
function nextQuestion() {
    var pool = getPool();
    var totalInPool = pool.length;
    var unanswered = pool.filter(function(q){ return !progress.isAnswered(q.id); });

    if (unanswered.length === 0) {
        topicCompleted = true;
        currentQ = null;
        render();
        return;
    }
    topicCompleted = false;

    // Adaptive selection
    var weak = progress.weakTopics();
    var weakPool = unanswered.filter(function(q){ return weak.indexOf(q.topic) >= 0; });
    var chosen;
    if (weakPool.length > 0 && Math.random() < 0.7) {
        chosen = weakPool[Math.floor(Math.random() * weakPool.length)];
    } else {
        chosen = unanswered[Math.floor(Math.random() * unanswered.length)];
    }

    // Shuffle options
    var indices = [];
    for (var i = 0; i < chosen.options.length; i++) indices.push(i);
    for (var i = indices.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
    }
    var shuffled = [];
    for (var i = 0; i < indices.length; i++) shuffled.push(chosen.options[indices[i]]);
    var newCorrect = indices.indexOf(chosen.correct);

    currentQ = {
        id: chosen.id, category: chosen.category, subcategory: chosen.subcategory,
        topic: chosen.topic, question: chosen.question, explanation: chosen.explanation,
        options: shuffled, correct: newCorrect,
        _totalPool: totalInPool, _remaining: unanswered.length
    };
    answered = false;
    selectedAns = null;
    render();
}

function pickAnswer(idx) {
    if (answered) return;
    selectedAns = idx;
    answered = true;
    progress.record(currentQ.id, currentQ.topic, idx === currentQ.correct);
    render();
}

function clickAll() {
    selectedCat = null; selectedSub = null; currentQ = null; topicCompleted = false;
    render();
}

function clickCat(cat) {
    if (selectedCat === cat) { selectedCat = null; } else { selectedCat = cat; }
    selectedSub = null; currentQ = null; topicCompleted = false;
    render();
}

function clickSub(cat, sub) {
    selectedCat = cat;
    if (selectedSub === sub) { selectedSub = null; } else { selectedSub = sub; }
    currentQ = null; topicCompleted = false;
    render();
}

function handleReset() {
    if (confirm('Are you sure you want to reset ALL progress? This cannot be undone.')) {
        progress.reset();
        currentQ = null; answered = false; selectedAns = null; topicCompleted = false;
        render();
    }
}

function redoTopic() {
    var pool = getPool();
    for (var i = 0; i < pool.length; i++) delete progress.answeredIds[pool[i].id];
    progress.save();
    topicCompleted = false;
    currentQ = null;
    render();
}

// START
render();
</script>
</body>
</html>
